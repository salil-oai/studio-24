services:
  postgres:
    image: postgres:17-alpine
    container_name: studio-24-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: studio24
      POSTGRES_USER: studio24
      POSTGRES_PASSWORD: studio24
    ports:
      - "54324:5432"
    volumes:
      - studio24-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studio24 -d studio24"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  studio24-postgres-data:
